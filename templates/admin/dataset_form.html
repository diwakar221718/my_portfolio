{% extends "base.html" %}

{% block title %}{% if dataset %}Edit{% else %}Add{% endif %} Dataset - Admin{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h1>{% if dataset %}Edit Dataset{% else %}Add New Dataset{% endif %}</h1>
            
            <form method="POST" class="mt-4">
                <div class="mb-3">
                    <label for="name" class="form-label">Dataset Name *</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ dataset.name if dataset else '' }}" required>
                </div>
                
                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="4">{{ dataset.description if dataset else '' }}</textarea>
                </div>
                
                <div class="mb-3">
                    <label for="data_type" class="form-label">Data Type</label>
                    <select class="form-control" id="data_type" name="data_type">
                        <option value="">Select Type</option>
                        <option value="tabular" {% if dataset and dataset.data_type == 'tabular' %}selected{% endif %}>Tabular</option>
                        <option value="image" {% if dataset and dataset.data_type == 'image' %}selected{% endif %}>Image</option>
                        <option value="text" {% if dataset and dataset.data_type == 'text' %}selected{% endif %}>Text</option>
                        <option value="timeseries" {% if dataset and dataset.data_type == 'timeseries' %}selected{% endif %}>Time Series</option>
                        <option value="audio" {% if dataset and dataset.data_type == 'audio' %}selected{% endif %}>Audio</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="size" class="form-label">Size (e.g., 500MB, 1GB)</label>
                    <input type="text" class="form-control" id="size" name="size" value="{{ dataset.size if dataset else '' }}">
                </div>
                
                <div class="mb-3">
                    <label for="format" class="form-label">Format (e.g., CSV, JSON, Parquet)</label>
                    <input type="text" class="form-control" id="format" name="format" value="{{ dataset.format if dataset else '' }}">
                </div>
                
                <div class="mb-3">
                    <label for="creation_date" class="form-label">Creation Date</label>
                    <input type="date" class="form-control" id="creation_date" name="creation_date" value="{{ dataset.creation_date.strftime('%Y-%m-%d') if dataset and dataset.creation_date else '' }}">
                </div>
                
                <div class="mb-3">
                    <label for="download_url" class="form-label">Download URL</label>
                    <input type="url" class="form-control" id="download_url" name="download_url" placeholder="https://..." value="{{ dataset.download_url if dataset else '' }}">
                </div>
                
                <div class="mb-3">
                    <label for="documentation_url" class="form-label">Documentation URL</label>
                    <input type="url" class="form-control" id="documentation_url" name="documentation_url" placeholder="https://..." value="{{ dataset.documentation_url if dataset else '' }}">
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        {% if dataset %}Update Dataset{% else %}Add Dataset{% endif %}
                    </button>
                    <a href="{{ url_for('admin_datasets') }}" class="btn btn-secondary">Cancel</a>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary ms-auto">
                        <i class="fas fa-arrow-left"></i> Back to Dashboard
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
