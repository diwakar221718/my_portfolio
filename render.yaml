services:
  - type: web
    name: portfolio
    env: python
    plan: free
    pythonVersion: 3.11.9
    buildCommand: bash build.sh
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
